name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: roa-linux
            binary_name: roa
          - os: macos-latest
            artifact_name: roa-macos
            binary_name: roa
          - os: windows-latest
            artifact_name: roa-windows
            binary_name: roa.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable minus 8 releases

      - name: Build release
        run: cargo build --release

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}${{ matrix.binary_name == 'roa.exe' && '.exe' || '' }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: artifacts/**/*
          generate_release_notes: true
